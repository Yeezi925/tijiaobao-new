name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USERNAME: ${{ secrets.SERVER_USERNAME }}
          KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << EOF
          Host deploy
            HostName $HOST
            User $USERNAME
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
          ssh -o ConnectTimeout=30 deploy 'cd /var/www/tijiaobao-new && git pull origin main && npm install --legacy-peer-deps && npm run build && env PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.nvm/versions/node/v22.22.2/bin pm2 restart all'
